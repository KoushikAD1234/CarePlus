version: "3.8"

services:
  postgres:
    image: postgres:14
    container_name: clinic_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinic_db
    ports:
      - "5432:5432"

  redis:
    image: redis
    container_name: clinic_redis
    ports:
      - "6379:6379"